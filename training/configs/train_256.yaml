dataset:
  root: "../pipeline/dataset"
  image_size: 256 # Experimenting at lower resolution
  train_split: 0.9
  num_workers: 2
  prefetch_factor: 2
  max_samples: 15000

model:
  type: scratch
  base_channels: 32
  depth: 4
  use_checkpoint: true

training:
  epochs: 50
  batch_size: 32
  grad_accum_steps: 2
  lr: 1.0e-4
  lr_scheduler: cosine_warmup
  weight_decay: 1.0e-4
  grad_clip: 100.0
  amp: true
  val_every: 1
  ema_decay: 0.97

torch_threads: 4

loss:
  l1_masked: 5.0
  border: 16.0
  bg_tv: 0.5
  interior_tv: 0.1
  bg_delta: 1.0
  color_moment: 0.7
  perceptual: 0.1
  perceptual_every: 1
  saturation: 0.4
  # Surgical edge clean-up terms (use edge-focused soft ring: 4*m*(1-m))
  edge_grad: 0.03
  edge_coherence: 0.02
  edge_laplacian: 0.01
  # Keep already-good regions anchored to the starting checkpoint output.
  drift: 1.0
  drift_anchor_scale: 2.0
  loss_mask_blur_pct: 4.0
  erosion_kernel: 3 # Scaled down for 256px

checkpointing:
  dir: "./checkpoints_256" # Separate dir for experiment
  save_every: 1
  keep_last: 5

logging:
  dir: "./runs_256" # Separate dir for experiment
  log_every: 10

seed: 42
device: cuda
