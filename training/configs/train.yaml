dataset:
  root: "../pipeline/dataset" # relative to training/ — generated by running wm-generate in pipeline/
  image_size: 512 # Upgraded from 256; use gradient checkpointing to fit 8 GB VRAM
  train_split: 0.9
  num_workers: 2 # Reduced to avoid Windows multiprocessing overhead
  prefetch_factor: 2
  max_samples: 15000

model:
  type: scratch # scratch | pretrained
  # --- scratch (MaskedUNet, from random weights) ---
  base_channels: 32 # ~8M params; fits 8 GB with gradient checkpointing at 512px
  depth: 4 # encoder stages
  use_checkpoint: true # gradient checkpointing — halves activation memory, +30% compute
  # --- pretrained (smp.Unet with ImageNet encoder) ---
  encoder: efficientnet-b0
  encoder_weights: imagenet

training:
  epochs: 400 # Extended for long-term surgical convergence
  batch_size: 8 # Down from 32; 512px images are 4× larger in memory
  grad_accum_steps: 8 # 8 × 8 = eff. batch 64 — double the update frequency
  lr: 1.5e-4 # Aggressive LR for active removal
  lr_scheduler: cosine_warmup
  weight_decay: 1.0e-4
  grad_clip: 20.0
  amp: true # bfloat16 mixed precision — same range as fp32, no overflow, ~2× throughput
  val_every: 5 # validate every 5 epochs
  ema_decay: 0.999 # EMA of model weights — smoother, cleaner inference

# torch_threads controls intra-op parallelism (matrix ops, convolutions).
# 0 = let PyTorch choose (uses all cores). Set explicitly to leave threads
# free for the OS, e.g. cpu_count - 2.
torch_threads: 4 # GPU handles compute; keep CPU free for data loading

loss:
  l1_masked: [2.0, 6.0] # interior removal — ramps from 2.0 to 6.0 over training
  border: [4.0, 12.0] # feathered edge transition zone — raised ceiling now that blur fires
  bg_tv: 0.5 # total variation on background delta — suppresses grid/checkerboard artifacts
  interior_tv: 0.1 # total variation on interior delta — fixes VGG checkerboards
  bg_delta: 1.0 # L1 penalty on delta outside mask — forces delta→0 in background

  # Global terms
  color_moment: 0.7 # per-channel mean match inside mask
  perceptual: [0.05, 0.2] # texture preservation — ramped to match L1 growth
  perceptual_every: 1

  # New terms (512px + white-overlay physics)
  saturation:
    [0.1, 1.2] # HSV saturation + value recovery — start lower (was 0.3)
    # to avoid overwhelming l1_masked in early epochs when
    # delta≈0 means full watermark desaturation error is active

  # Loss mask blur: sigma = image_size × (blur_pct / 100)
  # At 512px and 8.0% → sigma ≈ 40.96px → ksize ≈ 246px (wide soft transition zone)
  # Previously 2.5% with broken ksize = sigma*3 → almost no border ring activation.
  edge_grad: [0.01, 0.04] # gradient mismatch in the edge ring
  edge_coherence: [0.005, 0.03] # directional coherence of residual edges
  edge_laplacian: [0.0, 0.015] # second-derivative cleanup for thin halo traces
  drift: [1.5, 0.8] # anchor to initial model output outside edge ring
  drift_anchor_scale: 2.0
  loss_mask_blur_pct: 4.0

  # Erosion kernel for mask interior: scales with resolution.
  # 3px at 256 → 7px at 512 preserves ~1.2% proportional interior margin.
  erosion_kernel: 7

checkpointing:
  dir: "./checkpoints"
  save_every: 1
  keep_last: 5

logging:
  dir: "./runs"
  log_every: 10 # steps

seed: 42
device: cuda # RTX 3070
