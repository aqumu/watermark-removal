dataset:
  root: "../pipeline/dataset"  # relative to training/ — generated by running wm-generate in pipeline/
  image_size: 128          # 256 = 4× fewer ops than 512; raise to 512 for final run
  train_split: 0.9
  num_workers: 2           # parallel data loading (2 is safe on Windows/spawn)
  max_samples: 3000        # null = use all samples; set to e.g. 1000 to cap

model:
  base_channels: 32        # 5k samples comfortably supports the larger model
  depth: 4                 # encoder stages

training:
  epochs: 60               # model was underfit at 12; border/colour artefacts need more steps
  batch_size: 16           # larger batch → fewer steps/epoch, better CPU utilisation
  lr: 2.0e-4
  lr_scheduler: cosine     # cosine | step | none
  weight_decay: 1.0e-4
  grad_clip: 1.0
  amp: false               # set true on CUDA for faster training
  val_every: 5             # validate every 5 epochs

# torch_threads controls intra-op parallelism (matrix ops, convolutions).
# 0 = let PyTorch choose (uses all cores). Set explicitly to leave threads
# free for the OS, e.g. cpu_count - 2.
torch_threads: 0

loss:
  l1_full: 1.0             # L1 on the entire image
  l1_masked: 4.0           # raised from 2.0 — model was under-correcting the watermark region
  perceptual: 0.1          # VGG perceptual loss — texture around edges
  ssim: 1.0                # SSIM loss — border-quality sensitive
  color_moment: 2.0        # per-channel mean match inside mask
  border: 1.5              # extra penalty on the feathered edge transition zone
  perceptual_every: 4      # compute VGG only every N steps (saves ~25% total time)

checkpointing:
  dir: "./checkpoints"
  save_every: 5
  keep_last: 3

logging:
  dir: "./runs"
  log_every: 20            # steps

seed: 42
device: auto   # auto = CUDA if available, else CPU; or set explicitly: cpu / cuda
