dataset:
  root: "../pipeline/dataset"  # relative to training/ — generated by running wm-generate in pipeline/
  image_size: 256          # 256 = 4× fewer ops than 512; raise to 512 for final run
  train_split: 0.9
  num_workers: 2           # parallel data loading (2 is safe on Windows/spawn)
  max_samples: 1000       # Increased to 1000 for better edge diversity

model:
  type: scratch            # scratch | pretrained
  # --- scratch (MaskedUNet, from random weights) ---
  base_channels: 32        # 5k samples comfortably supports the larger model
  depth: 4                 # encoder stages
  # --- pretrained (smp.Unet with ImageNet encoder) ---
  encoder: efficientnet-b0
  encoder_weights: imagenet

training:
  epochs: 400              # Extended for long-term surgical convergence
  batch_size: 16           # larger batch → fewer steps/epoch, better CPU utilisation
  lr: 2.0e-4               # Lowered for stable convergence
  lr_scheduler: cosine     # cosine | step | none
  weight_decay: 1.0e-4
  grad_clip: 0.5           # Tighter clipping to prevent gradient explosion/oscillation
  amp: false               # set true on CUDA for faster training
  val_every: 1             # validate every 5 epochs

# torch_threads controls intra-op parallelism (matrix ops, convolutions).
# 0 = let PyTorch choose (uses all cores). Set explicitly to leave threads
# free for the OS, e.g. cpu_count - 2.
torch_threads: 10

loss:
  l1_full: 0.1              # Anchor background
  l1_masked: 1.0           # Re-enable interior focus
  perceptual: 1.0           # Re-enable texture
  ssim: 1.0                 # Balance structural quality
  color_moment: 0.5         # per-channel mean match inside mask
  border: 12.0              # extra penalty on the feathered edge transition zone
  edge_ring: 60.0           # STABILIZED HAMMER - high but not explosive
  edge_ring_px: 12          # 12px search zone
  perceptual_every: 3       # compute VGG only every N steps (saves ~25% total time)
  loss_mask_dilate_pct: 2.0 # Widen the zone to capture sub-pixel smear
  loss_mask_blur_pct: 1.5   # Gaussian sigma as % of image size — resolution-independent.
                            # e.g. 2.0 → sigma = 2.56 px at 128×128, 10.24 px at 512×512.
                            # 0 = no blur.

checkpointing:
  dir: "./checkpoints"
  save_every: 1
  keep_last: 5

logging:
  dir: "./runs"
  log_every: 20            # steps

seed: 42
device: cpu   # auto = CUDA if available, else CPU; or set explicitly: cpu / cuda
